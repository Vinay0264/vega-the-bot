async function saveCurrentChat(){
  if(!chatHistory.length) return;
  // Title = 2nd user message (more meaningful than first)
  const userMsgs=chatHistory.filter(m=>m.role==='user');
  const title=(userMsgs[1]||userMsgs[0])?.content?.slice(0,42)||'Chat';
  const chat={id:currentChatId,title,messages:chatHistory.slice(),ts:Date.now()};
  allChats[currentChatId]=chat;
  try{
    await fetch(`/chats/${currentChatId}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(chat)
    });
  }catch(e){console.warn('[Chat save]',e);}
  renderHistoryList();
}

async function loadChats(){
  try{
    const r=await fetch('/chats');
    if(r.ok) allChats=await r.json();
    else allChats={};
  }catch(e){allChats={};}
  renderHistoryList();
}

async function deleteChat(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  if(!confirm('Delete this chat?')) return;
  try{await fetch(`/chats/${id}`,{method:'DELETE'});}catch(e){}
  delete allChats[id];
  if(id===currentChatId) newChat();
  else renderHistoryList();
}

function renderHistoryList(filter=''){
  const list=document.getElementById('historyList');if(!list)return;list.innerHTML='';
  const chats=Object.values(allChats).sort((a,b)=>b.ts-a.ts)
    .filter(c=>!filter||c.title.toLowerCase().includes(filter.toLowerCase()));
  if(!chats.length){
    list.innerHTML='<div style="padding:16px;text-align:center;color:var(--t3);font-size:11px">No chats yet</div>';
    return;
  }
  const today=new Date().toDateString(),yesterday=new Date(Date.now()-86400000).toDateString();
  let lastD='';
  chats.forEach(c=>{
    const d=new Date(c.ts).toDateString();
    const lbl=d===today?'Today':d===yesterday?'Yesterday':new Date(c.ts).toLocaleDateString();
    if(lbl!==lastD){
      const dEl=document.createElement('div');dEl.className='history-date';dEl.textContent=lbl;
      list.appendChild(dEl);lastD=lbl;
    }
    const item=document.createElement('div');
    item.className='history-item'+(c.id===currentChatId?' active':'');
    item.innerHTML=`
      <div style="display:flex;align-items:center;gap:4px">
        <div class="history-item-title" style="flex:1;min-width:0">${c.title}</div>
        <button class="del-chat-btn" data-id="${c.id}" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:1px 4px;border-radius:3px;flex-shrink:0;line-height:1">✕</button>
      </div>
      <div class="history-item-meta">${new Date(c.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
    item.querySelector('.del-chat-btn').addEventListener('click',ev=>deleteChat(c.id,ev));
    item.addEventListener('click',()=>loadChat(c.id));
    list.appendChild(item);
  });
}

function loadChat(id){
  const c=allChats[id];if(!c)return;
  currentChatId=id;chatHistory=c.messages.slice();
  const container=document.getElementById('chatMessages');if(!container)return;
  container.innerHTML='';chatHistory.forEach(m=>addMessage(m.role==='user'?'user':'vega',m.content));
  renderHistoryList();
}
function newChat(){
  currentChatId=Date.now().toString();chatHistory=[];
  const c=document.getElementById('chatMessages');if(c)c.innerHTML='';
  renderHistoryList();setEmotion('neutral');
  document.getElementById('vegaInput')?.focus();
}
function filterHistory(v){renderHistoryList(v);}

// ════════════════════════════════════════════
//  DEV PANEL — live preview canvas
// ════════════════════════════════════════════
const devCanvas=document.getElementById('devPreviewCanvas');
const devCtx=devCanvas.getContext('2d');
const DW=200,DH=128,DCX=DW/2,DCY=DH/2;
// Mini eye constants (scaled down ~0.71x from main)
const D_EW=54,D_EH=41,D_GAP=22;
const D_LX=DCX-D_EW-D_GAP/2, D_RX=DCX+D_GAP/2, D_EY=DCY-D_EH/2;
let devEmotion='neutral';
let devSweatDrops=[],devHeartParticles=[],devZzz=[];
let devLastTs=0;

function devRRect(x,y,w,h,r,fill){
  r=Math.max(0,Math.min(r,w/2,h/2));
  devCtx.beginPath();
  devCtx.moveTo(x+r,y);devCtx.lineTo(x+w-r,y);devCtx.quadraticCurveTo(x+w,y,x+w,y+r);
  devCtx.lineTo(x+w,y+h-r);devCtx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  devCtx.lineTo(x+r,y+h);devCtx.quadraticCurveTo(x,y+h,x,y+h-r);
  devCtx.lineTo(x,y+r);devCtx.quadraticCurveTo(x,y,x+r,y);
  devCtx.closePath();if(fill){devCtx.fillStyle=fill;devCtx.fill();}
}

function devDrawEye(x,y,w,h,br,tH,aH,hapOff,col){
  if(h<1)return;
  devRRect(x,y,w,h,br,col);
  if(tH>0.5){
    devCtx.save();devCtx.globalCompositeOperation='destination-out';devCtx.beginPath();
    devCtx.moveTo(x,y-1);devCtx.lineTo(x+w,y-1);devCtx.lineTo(x,y+tH-1);
    devCtx.closePath();devCtx.fillStyle='#000';devCtx.fill();devCtx.restore();
  }
  if(aH>0.5){
    devCtx.save();devCtx.globalCompositeOperation='destination-out';devCtx.beginPath();
    devCtx.moveTo(x,y-1);devCtx.lineTo(x+w,y-1);devCtx.lineTo(x+w,y+aH-1);
    devCtx.closePath();devCtx.fillStyle='#000';devCtx.fill();devCtx.restore();
  }
  if(hapOff>0.5){
    devCtx.save();devCtx.globalCompositeOperation='destination-out';
    devRRect(x-1,(y+h)-hapOff+1,w+2,h+4,br,'#000');devCtx.restore();
  }
  // pupil (mini, always show in preview for both styles)
  const pr=Math.min(w,h)*0.3;
  devCtx.beginPath();devCtx.arc(x+w*0.5,y+h*0.5,pr,0,Math.PI*2);
  devCtx.fillStyle='rgba(0,0,0,0.85)';devCtx.fill();
  devCtx.beginPath();devCtx.arc(x+w*0.5-pr*0.28,y+h*0.5-pr*0.28,pr*0.22,0,Math.PI*2);
  devCtx.fillStyle='rgba(255,255,255,0.8)';devCtx.fill();
}

function devRenderFrame(ts){
  if(!document.getElementById('devPanel').classList.contains('open')){devLastTs=ts;requestAnimationFrame(devRenderFrame);return;}
  devCtx.clearRect(0,0,DW,DH);
  const em=EMOTIONS[devEmotion];if(!em){requestAnimationFrame(devRenderFrame);return;}
  const col=em.color;
  // Background tint
  devCtx.fillStyle=col+'18';devCtx.fillRect(0,0,DW,DH);
  // Draw based on emotion state (simplified mirror of main canvas)
  const d=devEmotionState(devEmotion,ts);
  if(d.battery){
    // battery
    const bw=90,bh=36,bx=DCX-bw/2,by=DCY-bh/2;
    devCtx.strokeStyle=col;devCtx.lineWidth=1.5;
    devRRect(bx,by,bw,bh,5,null);devCtx.stroke();
    devRRect(bx+bw+1,DCY-6,5,12,2,col);devCtx.fill();
    const fw=Math.max(3,(bw-6)*d.batLevel);
    devRRect(bx+3,by+3,fw,bh-6,3,col);
    devCtx.fillStyle=col;devCtx.font='bold 10px "JetBrains Mono",monospace';devCtx.textAlign='center';devCtx.textBaseline='middle';
    devCtx.fillText(Math.round(d.batLevel*100)+'%',DCX,DCY);
  } else if(d.question){
    devCtx.fillStyle=col;devCtx.font='bold 68px "Syne",sans-serif';devCtx.textAlign='center';devCtx.textBaseline='middle';devCtx.fillText('?',DCX,DCY+3);
  } else if(d.sleep){
    devCtx.fillStyle=col;devRRect(D_LX,D_EY+D_EH/2-1,D_EW,2,1,col);
    devRRect(D_RX,D_EY+D_EH/2-1,D_EW,2,1,col);
    devCtx.fillStyle=col;devCtx.font='bold 14px "Space Grotesk",sans-serif';devCtx.textAlign='center';devCtx.textBaseline='middle';devCtx.fillText('z z z',DCX,D_EY-12);
  } else {
    const lx=D_LX+d.sx,ly=D_EY+d.sy,rx=D_RX+d.sx,ry=D_EY+d.sy;
    const br=eyeStyle==='square'?3:10;
    devDrawEye(lx,ly,D_EW*d.lws,D_EH*d.lhs,br*d.brs,D_EH*d.tH,D_EH*d.aH,D_EH*d.hapOff,col);
    devDrawEye(rx,ry,D_EW*d.rws,D_EH*d.rhs,br*d.brs,D_EH*d.tH,D_EH*d.aH,D_EH*d.hapOff,col);
    // blush
    if(d.blush){
      devCtx.save();devCtx.globalAlpha=0.3;
      const lg=devCtx.createRadialGradient(lx+D_EW*0.1,ly+D_EH+5,1,lx+D_EW*0.1,ly+D_EH+5,16);
      lg.addColorStop(0,'#f472b6');lg.addColorStop(1,'rgba(244,114,182,0)');
      devCtx.fillStyle=lg;devCtx.beginPath();devCtx.ellipse(lx+D_EW*0.1,ly+D_EH+5,16,10,0,0,Math.PI*2);devCtx.fill();
      const rg=devCtx.createRadialGradient(rx+D_EW*0.9,ry+D_EH+5,1,rx+D_EW*0.9,ry+D_EH+5,16);
      rg.addColorStop(0,'#f472b6');rg.addColorStop(1,'rgba(244,114,182,0)');
      devCtx.fillStyle=rg;devCtx.beginPath();devCtx.ellipse(rx+D_EW*0.9,ry+D_EH+5,16,10,0,0,Math.PI*2);devCtx.fill();
      devCtx.restore();
    }
    // tears for sad/crying
    if(d.tears){
      devCtx.fillStyle='rgba(96,165,250,0.7)';
      [[lx+D_EW*0.3,ly+D_EH+4],[lx+D_EW*0.55,ly+D_EH+8],[rx+D_EW*0.3,ry+D_EH+4],[rx+D_EW*0.55,ry+D_EH+8]].forEach(([tx,ty],i)=>{
        devCtx.beginPath();devCtx.arc(tx,ty+(ts*0.04+i*15)%22,d.tears?2.5:1.8,0,Math.PI*2);devCtx.fill();
      });
    }
    // headphones for listening
    if(d.headphones){
      devCtx.save();devCtx.strokeStyle=col;devCtx.lineWidth=2;devCtx.lineCap='round';
      devCtx.beginPath();devCtx.arc(lx+D_EW/2,ly,7,Math.PI*0.4,Math.PI*1.6);devCtx.stroke();
      devCtx.beginPath();devCtx.arc(rx+D_EW/2,ry,7,Math.PI*1.4,Math.PI*2.6);devCtx.stroke();
      devCtx.beginPath();devCtx.arc(DCX,(D_EY-14),rx-lx-2,Math.PI,0,false);devCtx.stroke();
      devCtx.restore();
    }
  }
  // emotion name
  devCtx.fillStyle=col;devCtx.font='500 10px "Space Grotesk",sans-serif';devCtx.textAlign='center';devCtx.textBaseline='bottom';
  devCtx.fillText(em.label,DCX,DH-4);
  requestAnimationFrame(devRenderFrame);
}

// Simplified emotion state for dev preview
function devEmotionState(name,ts){
  const base={lws:1,rws:1,lhs:1,rhs:1,tH:0,aH:0,hapOff:0,brs:1,blush:false,tears:false,headphones:false,sleep:false,question:false,battery:false,batLevel:1,sx:0,sy:0};
  const shake=ts?Math.sin(ts*0.05)*2:0;
  switch(name){
    case'happy':return{...base,hapOff:0.46};
    case'sad':return{...base,tH:0.3,lhs:0.74,rhs:0.74,tears:true};
    case'crying':return{...base,tH:0.62,lhs:0.52,rhs:0.52,lws:0.88,rws:0.88,tears:true};
    case'ouch':return{...base,lhs:0.6,rhs:0.6,lws:0.7,rws:0.7,sx:shake};
    case'hurt':return{...base,tH:0.4,lhs:0.65,rhs:0.65};
    case'confused':return{...base,lws:0.84,rws:1.14,lhs:0.88,sx:Math.sin(ts*0.08)*3};
    case'surprised':return{...base,lws:1.22,rws:1.22,lhs:1.26,rhs:1.26};
    case'thinking':return{...base,lhs:0.88};
    case'working':return{...base,lhs:0.82,rhs:0.82};
    case'sleepy':return{...base,tH:0.54,lhs:0.54,rhs:0.54};
    case'sleeping':return{...base,sleep:true};
    case'excited':return{...base,lws:1.16,rws:1.16,lhs:1.12+Math.abs(Math.sin(ts*0.018))*0.1,rhs:1.12+Math.abs(Math.sin(ts*0.018))*0.1};
    case'listening':return{...base,lws:1.06,rws:1.06,lhs:1.06,rhs:1.06,headphones:true};
    case'speaking':return{...base,lhs:0.9+Math.sin(ts*0.02)*0.05,rhs:0.9+Math.sin(ts*0.02)*0.05};
    case'angry':case'frustrated':return{...base,aH:name==='frustrated'?0.58:0.44};
    case'love':return{...base,lhs:1.06,rhs:1.06,hapOff:0.1};
    case'blush':return{...base,lhs:0.9,rhs:0.9,hapOff:0.22,blush:true};
    case'nervous':return{...base,lhs:0.82,rhs:0.82,sx:Math.sin(ts*0.06)*1.5,sy:Math.sin(ts*0.07)*1.5};
    case'pleading':return{...base,lws:1.3,rws:1.3,lhs:1.3,rhs:1.3,brs:1.5};
    case'sarcastic':return{...base,lhs:0.40,rhs:0.72,tH:0.20};
    case'alert':return{...base,lws:1.2,rws:1.2,lhs:1.2,rhs:1.2};
    case'speechless':return{...base,lws:1.32,rws:1.32,lhs:1.32,rhs:1.32};
    case'chilling':return{...base,tH:0.26,lhs:0.72,rhs:0.72};
    case'curious':return{...base,lws:0.84,rws:1.22,lhs:0.9,rhs:1.12};
    case'laugh':return{...base,hapOff:0.55,sy:Math.sin(ts*0.02)*3};
    case'music':return{...base,lhs:0.88,rhs:0.88,hapOff:0.22,sy:Math.sin(ts*0.003)*3};
    case'question':return{...base,question:true};
    case'battery_high':return{...base,battery:true,batLevel:0.82};
    case'battery_mid':return{...base,battery:true,batLevel:0.44};
    case'battery_low':return{...base,battery:true,batLevel:0.11};
    default:return base;
  }
}

function buildDevPanel(){
  const grid=document.getElementById('devGrid');if(!grid)return;grid.innerHTML='';
  Object.entries(EMOTIONS).forEach(([key,em])=>{
    const btn=document.createElement('button');btn.className='dev-btn';btn.dataset.emotion=key;
    btn.textContent=em.label||key;btn.style.borderColor=em.color+'55';
    btn.onclick=()=>{
      devEmotion=key;
      setEmotion(key);// also apply to main face
      document.getElementById('devPreviewLabel').textContent=em.label;
      document.getElementById('devPreviewLabel').style.color=em.color;
    };
    grid.appendChild(btn);
  });
  requestAnimationFrame(devRenderFrame);
}
function openDevPanel(){document.getElementById('devPanel').classList.add('open');}
function closeDevPanel(){document.getElementById('devPanel').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(e.key==='`'||e.key==='~'){document.getElementById('devPanel').classList.toggle('open');e.preventDefault();}
  if(e.key==='Escape')closeDevPanel();
});

// ════════════════════════════════════════════
//  BATTERY MONITORING
// ════════════════════════════════════════════
let batteryObj=null;
let lastBatteryLevel=-1;
let batteryWarned=false;

async function initBattery(){
  if(!('getBattery' in navigator)) return;
  try{
    batteryObj=await navigator.getBattery();
    updateBatteryDisplay();
    batteryObj.addEventListener('levelchange',onBatteryChange);
    batteryObj.addEventListener('chargingchange',onBatteryChange);
    // Poll every 30s as backup
    setInterval(updateBatteryDisplay,30000);
  }catch(e){console.warn('[Battery]',e);}
}

function onBatteryChange(){updateBatteryDisplay();}

function updateBatteryDisplay(){
  if(!batteryObj) return;
  const pct=Math.round(batteryObj.level*100);
  const charging=batteryObj.charging;
  const el=document.getElementById('dashBattery');
  const elS=document.getElementById('dashBatteryStatus');
  if(el){
    el.textContent=pct+'%';
    el.style.color=pct>60?'var(--green)':pct>20?'var(--amber)':'var(--red)';
  }
  if(elS) elS.textContent=charging?'⚡ Charging':'On battery';

  // Auto-trigger expression on significant change
  if(Math.abs(pct-lastBatteryLevel)>=5||lastBatteryLevel===-1){
    lastBatteryLevel=pct;
    // Show battery expression briefly if in normal state
    if(!['sleeping','sleepy','crying','sad'].includes(currentEmotion)){
      if(pct<=15&&!charging&&!batteryWarned){
        batteryWarned=true;
        setEmotion('battery_low');
        // Proactive warning
        proactiveSpeak(`Sir, battery is at ${pct}%. Please plug in soon.`);
      } else if(pct>15&&pct<=30&&!charging){
        setEmotion('battery_mid');
        setTimeout(()=>{if(currentEmotion==='battery_mid')setEmotion('neutral');},4000);
      }
      if(charging&&pct>15) batteryWarned=false;
    }
  }
}

// ════════════════════════════════════════════
//  PROACTIVE SPEECH — Vega talks on its own
// ════════════════════════════════════════════
let lastProactiveMs=0;
const PROACTIVE_COOLDOWN=60000; // min 1 min between proactive messages

function proactiveSpeak(text,emotion){
  const now=Date.now();
  if(now-lastProactiveMs<PROACTIVE_COOLDOWN) return;
  lastProactiveMs=now;
  if(emotion) setEmotion(emotion);
  addMessage('vega',text);
  chatHistory.push({role:'assistant',content:text});
  speak(text);
}

// Proactive: idle for 2 minutes — Vega starts a conversation
let proactiveIdleTimer=null;
const PROACTIVE_IDLE_MS=120000; // 2 minutes

const PROACTIVE_IDLE_MSGS=[
  {text:"Sir, I'm here if you need anything.",emotion:'chilling'},
  {text:"Just checking in, sir — all good?",emotion:'curious'},
  {text:"Whenever you're ready, sir.",emotion:'neutral'},
  {text:"Bit quiet today, sir. Need anything?",emotion:'chilling'},
];

function resetProactiveIdleTimer(){
  clearTimeout(proactiveIdleTimer);
  proactiveIdleTimer=setTimeout(()=>{
    if(!wsReady||currentEmotion==='sleeping') return;
    const msg=PROACTIVE_IDLE_MSGS[Math.floor(Math.random()*PROACTIVE_IDLE_MSGS.length)];
    proactiveSpeak(msg.text,msg.emotion);
  },PROACTIVE_IDLE_MS);
}

// Proactive: user hovers over vegaInput while mic is active
document.addEventListener('mouseover',e=>{
  const vi=document.getElementById('vegaInput');
  if(vi&&e.target===vi&&micActive){
    const now=Date.now();
    if(now-lastProactiveMs>15000){
      lastProactiveMs=now;
      showToast('Voice input is active — you can speak instead');
      setEmotion('curious');
      setTimeout(()=>{if(currentEmotion==='curious')setEmotion('neutral');},2000);
    }
  }
});

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

// ════════════════════════════════════════════
//  RESIZE OBSERVER
// ════════════════════════════════════════════
new ResizeObserver(()=>resizeCanvas()).observe(document.getElementById('panel-vega'));

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
window.addEventListener('load',async()=>{
  rebuildPanels();
  resizeCanvas();
  await loadChats();
  buildDevPanel();
  connectWS();
  initBattery();
  resetProactiveIdleTimer();

  // Reset proactive timer on any user activity
  document.addEventListener('keydown',resetProactiveIdleTimer);
  document.addEventListener('click',resetProactiveIdleTimer);

  // Mode 2 (clean) active by default
  document.getElementById('modeBtn2').classList.add('active');

  // Greeting expression based on time
  const hr=new Date().getHours();
  setTimeout(()=>{
    if(hr>=22||hr<5) setEmotion('sleepy');
    else if(hr>=17) setEmotion('chilling');
    else setEmotion('happy');
    setTimeout(()=>setEmotion('neutral'),3200);
  },700);
});
