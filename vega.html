<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VEGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--bg2:#0b0e18;--bg3:#0f1420;--bg4:#141a28;--bg5:#1a2236;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.10);--bd3:rgba(255,255,255,0.18);
  --accent:#5ee7df;--accent2:#b490ff;--accent3:#ff6eb0;
  --ad:rgba(94,231,223,0.18);--ag:rgba(94,231,223,0.06);
  --t1:#e8edf8;--t2:#a4b2cd;--t3:#a4aec1;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;--pink:#f472b6;--blue:#60a5fa;
  --mono:'JetBrains Mono',monospace;--ui:'Space Grotesk',sans-serif;--display:'Syne',sans-serif;
  --r:8px;--r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--ui);font-size:14px;line-height:1.6;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none;border:none;background:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

.shell{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.panels{display:flex;width:100%;height:100%;overflow:hidden;position:relative;z-index:1}
.panel{height:100%;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--bd);position:relative;flex-shrink:0}
.panel:last-child{border-right:none}
.panel.collapsing{transition:width 0.3s cubic-bezier(0.4,0,0.2,1)}

/* drag handles */
.drag-handle{width:5px;height:100%;flex-shrink:0;cursor:col-resize;background:transparent;z-index:50;position:relative;transition:background 0.15s}
.drag-handle:hover{background:rgba(94,231,223,0.25)}
.drag-handle.dragging{background:rgba(94,231,223,0.45)}
.drag-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:48px;border-radius:7px;background:var(--bd2);pointer-events:none;transition:background 0.15s}
.drag-handle:hover::after,.drag-handle.dragging::after{background:var(--accent)}

/* panel header */
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-bottom:1px solid var(--bd);flex-shrink:0;min-height:38px;background:var(--bg2)}
.panel-title{font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--t2);white-space:nowrap}
.panel-actions{display:flex;gap:3px;align-items:center;flex-shrink:0}
.ph-btn{width:21px;height:21px;border-radius:5px;background:transparent;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all 0.15s;font-size:10px;flex-shrink:0}
.ph-btn:hover{background:var(--bg4);color:var(--t1);border-color:var(--bd2)}
.ph-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.move-btn{padding:2px 5px;border-radius:4px;font-size:9px;font-family:var(--mono);background:transparent;border:1px solid var(--bd);color:var(--t3);transition:all 0.15s;white-space:nowrap}
.move-btn:hover{color:var(--accent);border-color:var(--accent)}
.chip-btn{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:var(--bg3);border:1px solid var(--bd);color:var(--t3);cursor:pointer;transition:all 0.15s;font-family:var(--mono)}
.chip-btn.active{background:var(--ag);border-color:var(--accent);color:var(--accent)}
.chip-btn.purple.active{background:rgba(180,144,255,0.1);border-color:var(--accent2);color:var(--accent2)}
.chip-btn.red.active{background:rgba(248,113,113,0.1);border-color:var(--red);color:var(--red)}
.chip-btn.amber.active{background:rgba(251,191,36,0.1);border-color:var(--amber);color:var(--amber)}

/* collapsed tab */
.collapsed-tab{position:fixed;top:50%;transform:translateY(-50%);width:20px;height:70px;background:var(--bg3);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;transition:all 0.2s;writing-mode:vertical-rl;font-size:9px;color:var(--t3);letter-spacing:0.1em;font-family:var(--display);font-weight:600;text-transform:uppercase}
.collapsed-tab:hover{background:var(--bg4);color:var(--accent);border-color:var(--accent)}
.collapsed-tab.left-tab{left:0;border-radius:0 6px 6px 0;border-left:none}
.collapsed-tab.right-tab{right:0;border-radius:6px 0 0 6px;border-right:none}

/* ── HISTORY ── */
#panel-history{background:var(--bg2)}
.history-search{padding:7px 11px 9px;border-bottom:1px solid var(--bd)}
.history-search input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:5px 9px;color:var(--t1);font-size:12px;transition:border-color 0.2s}
.history-search input:focus{border-color:var(--bd2)}
.history-search input::placeholder{color:var(--t3)}
.history-content{flex:1;overflow-y:auto;padding:7px 9px}
.history-new-btn{margin:7px 11px;padding:7px;border-radius:var(--r);background:var(--ag);border:1px solid var(--bd2);color:var(--accent);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;justify-content:center;transition:all 0.2s;width:calc(100% - 22px)}
.history-new-btn:hover{background:var(--ad);border-color:var(--accent)}
.history-date{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:8px 3px 5px;font-family:var(--mono)}
.history-item{padding:7px 9px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all 0.15s}
.history-item:hover{background:var(--bg3);border-color:var(--bd)}
.history-item.active{background:var(--bg4);border-color:var(--bd2)}
.history-item-title{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.history-item-meta{font-size:10px;color:var(--t3);font-family:var(--mono)}

/* ── CHAT ── */
#panel-chat{background:var(--bg)}
.chat-status{padding:5px 11px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:sPulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:0.3}}
.status-text{font-size:11px;color:var(--t3);font-family:var(--mono);flex:1}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.status-dot.thinking{background:var(--amber);box-shadow:0 0 6px var(--amber)}
/* TTS mute btn in status bar */
.tts-btn{padding:2px 7px;border-radius:12px;font-size:10px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--bd);color:var(--t3);cursor:pointer;transition:all 0.15s;flex-shrink:0}
.tts-btn:hover{border-color:var(--bd2);color:var(--t2)}
.tts-btn.muted{background:rgba(248,113,113,0.1);border-color:var(--red);color:var(--red)}

.chat-messages{flex:1;overflow-y:auto;padding:14px 13px;display:flex;flex-direction:column;gap:11px}
.chat-messages::-webkit-scrollbar{width:2px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--bd)}
.msg{display:flex;gap:7px;animation:msgIn 0.26s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}

/* avatar with hover name reveal */
.msg-avatar-wrap{position:relative;flex-shrink:0;margin-top:2px}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:default;transition:all 0.2s}
.msg.vega .msg-avatar{background:var(--ag);border:1px solid var(--bd2);color:var(--accent);font-family:var(--display)}
.msg.user .msg-avatar{background:rgba(180,144,255,0.12);border:1px solid rgba(180,144,255,0.2);color:var(--accent2)}
.avatar-tooltip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--mono);color:var(--t1);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10}
.msg.user .avatar-tooltip{left:auto;right:50%;transform:translateX(50%)}
.msg-avatar-wrap:hover .avatar-tooltip{opacity:1}

.msg-bubble{max-width:82%;padding:8px 12px;border-radius:13px;font-size:13px;line-height:1.65;user-select:text;cursor:text}
.msg.vega .msg-bubble{background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:3px;color:var(--t1)}
.msg.user .msg-bubble{background:var(--bg4);border:1px solid var(--bd2);border-bottom-right-radius:3px;color:var(--t1)}
.msg-time{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:3px;padding:0 3px}
.msg.user .msg-time{text-align:right}
.typing-dots{display:flex;gap:4px;padding:2px 0}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:tB 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes tB{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.msg-bubble code{font-family:var(--mono);font-size:11.5px;background:var(--bg4);padding:1px 5px;border-radius:4px;color:var(--accent)}
.msg-bubble pre{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:9px;margin:6px 0;overflow-x:auto;font-family:var(--mono);font-size:11px;user-select:text}
.msg-bubble strong{font-weight:600}

/* WhatsApp sent card */
.wa-card{margin-top:6px;background:rgba(37,211,102,0.07);border:1px solid rgba(37,211,102,0.25);border-radius:10px;padding:8px 11px;display:flex;align-items:center;gap:9px}
.wa-card-icon{width:28px;height:28px;border-radius:50%;background:rgba(37,211,102,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wa-card-icon svg{width:15px;height:15px;fill:#25d366}
.wa-card-body{flex:1;min-width:0}
.wa-card-to{font-size:11px;color:#25d366;font-family:var(--mono);font-weight:600;margin-bottom:2px}
.wa-card-msg{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Music now playing card */
.music-card{margin-top:6px;background:rgba(180,144,255,0.07);border:1px solid rgba(180,144,255,0.25);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.music-card-icon{width:32px;height:32px;border-radius:8px;background:rgba(180,144,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:musicPulse 1.5s ease-in-out infinite}
@keyframes musicPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.music-card-icon svg{width:16px;height:16px;fill:var(--accent2)}
.music-card-body{flex:1;min-width:0}
.music-card-title{font-size:12px;font-weight:600;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.music-card-artist{font-size:11px;color:var(--t2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-card-badge{font-size:10px;color:var(--accent2);font-family:var(--mono);border:1px solid rgba(180,144,255,0.3);border-radius:20px;padding:1px 7px;flex-shrink:0}

/* task status bar */
.task-bar{padding:5px 11px;background:rgba(94,231,223,0.04);border-bottom:1px solid rgba(94,231,223,0.08);font-size:11px;font-family:var(--mono);color:var(--accent);display:none;align-items:center;gap:7px;flex-shrink:0}
.task-bar.active{display:flex}
.task-spinner{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--accent);border-top-color:transparent;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* input area */
.chat-input-area{padding:9px 11px;border-top:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.lang-row{display:flex;gap:4px;margin-bottom:6px}
.lang-chip{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:var(--bg3);border:1px solid var(--bd);color:var(--t3);cursor:pointer;transition:all 0.15s;font-family:var(--mono)}
.lang-chip.active{background:var(--ag);border-color:var(--accent);color:var(--accent)}
.chat-input-row{display:flex;align-items:flex-end;gap:6px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:6px 8px;transition:border-color 0.2s}
.chat-input-row:focus-within{border-color:var(--accent)}
.chat-textarea{flex:1;resize:none;color:var(--t1);font-size:13px;line-height:1.5;max-height:100px;min-height:20px;overflow-y:auto;background:transparent}
.chat-textarea::placeholder{color:var(--t3)}
.input-btns{display:flex;gap:4px;align-items:center;flex-shrink:0}
.input-btn{width:29px;height:29px;border-radius:var(--r);background:transparent;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all 0.15s}
.input-btn:hover{background:var(--bg4);border-color:var(--bd2);color:var(--t1)}
.input-btn.send{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.input-btn.send:hover{opacity:0.85}
.input-btn.mic-active{background:rgba(248,113,113,0.15);border-color:var(--red);color:var(--red);animation:micP 1s ease-in-out infinite}
@keyframes micP{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.4)}50%{box-shadow:0 0 0 5px rgba(248,113,113,0)}}
.input-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.input-btn.send svg{stroke:var(--bg)}

/* ── VEGA PANEL ── */
#panel-vega{background:var(--bg);position:relative;overflow:hidden}
.vega-mood-overlay{position:absolute;inset:0;pointer-events:none;z-index:1;transition:background 1.2s ease;background:transparent}
#panel-vega .panel-header{background:transparent;border-bottom-color:rgba(255,255,255,0.04);position:relative;z-index:5}
.vega-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:14px;gap:10px}
.vega-name{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.vega-face-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
#vegaCanvas{display:block;border-radius:20px;transition:filter 0.8s ease}
.emotion-label{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;transition:all 0.5s;text-align:center}
.vega-status{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;transition:color 0.5s;text-align:center;min-height:16px}

/* dashboard */
.vega-dashboard{display:none;width:100%;gap:6px}
.vega-dashboard.visible{display:grid;grid-template-columns:1fr 1fr}
.dash-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 10px;min-height:52px}
.dash-card.full{grid-column:1/-1}
.dash-label{font-size:9px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px}
.dash-val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--t1);transition:color 0.5s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-val.sm{font-size:11px}
.dash-val.accent{color:var(--accent)}
.mood-dots{display:flex;gap:4px;margin-top:4px;align-items:center}
.mood-dot{width:8px;height:8px;border-radius:50%;opacity:0.85;transition:all 0.4s;flex-shrink:0}
.task-steps{margin-top:4px;display:flex;flex-direction:column;gap:2px}
.task-step{font-size:10px;font-family:var(--mono);color:var(--t3);display:flex;align-items:center;gap:5px;transition:color 0.3s}
.task-step.done{color:var(--green)}
.task-step.active{color:var(--accent)}
.task-step-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* dev panel */
#devPanel{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;gap:16px;backdrop-filter:blur(12px);padding:16px}
#devPanel.open{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr auto}
.dev-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;grid-column:1/-1}
/* Left: live preview */
#devPreview{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px}
#devPreviewCanvas{border-radius:12px;display:block}
#devPreviewLabel{font-family:var(--mono);font-size:11px;color:var(--accent);text-align:center;letter-spacing:0.08em;text-transform:uppercase}
/* Right: grid of buttons */
.dev-grid{display:flex;flex-wrap:wrap;gap:5px;align-content:start;overflow-y:auto;padding:2px}
.dev-btn{padding:5px 11px;border-radius:7px;font-size:11px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--bd2);color:var(--t2);cursor:pointer;transition:all 0.15s}
.dev-btn:hover{background:var(--bg4);color:var(--t1);border-color:var(--bd3)}
.dev-btn.active{border-color:var(--accent);color:var(--accent);background:var(--ag)}
.dev-hint{font-family:var(--mono);font-size:10px;color:var(--t3);grid-column:1/-1;text-align:center}
.dev-close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:6px;background:var(--bg3);border:1px solid var(--bd2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s}
.dev-close:hover{background:var(--bg4);color:var(--t1)}

/* vega input bar */
.vega-input-bar{width:100%;padding:8px 4px 2px;flex-shrink:0}
.vega-lang-row{display:flex;gap:4px;margin-bottom:6px;align-items:center}
.vega-input-row{display:flex;align-items:flex-end;gap:6px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:6px 8px;transition:border-color 0.2s}
.vega-input-row:focus-within{border-color:var(--accent)}
.vega-textarea{flex:1;resize:none;color:var(--t1);font-size:13px;line-height:1.5;max-height:80px;min-height:20px;overflow-y:auto;background:transparent;font-family:var(--ui)}
.vega-textarea::placeholder{color:var(--t3)}

/* toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:8px 15px;font-size:12px;color:var(--t1);z-index:300;transition:transform 0.26s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;font-family:var(--mono);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">
<div class="panels" id="panelsContainer">

  <!-- PANEL 1: HISTORY -->
  <div class="panel" id="panel-history" data-name="History">
    <div class="panel-header">
      <span class="panel-title">History</span>
      <div class="panel-actions">
        <button class="move-btn" onclick="movePanel('panel-history','left')">◀</button>
        <button class="move-btn" onclick="movePanel('panel-history','right')">▶</button>
        <button class="ph-btn" onclick="collapsePanel('panel-history')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
        <!-- Select-mode action bar (hidden by default) -->
    <div id="selectBar" style="display:none;padding:5px 11px;background:var(--bg3);border-bottom:1px solid var(--bd);display:none;align-items:center;gap:6px;">
      <span id="selectCount" style="font-size:11px;color:var(--t3);font-family:var(--mono);flex:1">0 selected</span>
      <button onclick="selectAllChats()" style="font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg4);border:1px solid var(--bd);color:var(--t2);cursor:pointer">All</button>

<script>
// ════════════════════════════════════════════
//  CANVAS FACE ENGINE — from vega-eyes.js
// ════════════════════════════════════════════
const canvas = document.getElementById('vegaCanvas');
const ctx    = canvas.getContext('2d');

const CW = 280, CH = 180, CX = CW/2, CY = CH/2;
const EYE_W = 76, EYE_H = 58, EYE_GAP = 30;
const EYE_BR_ROUND = 14, EYE_BR_SQUARE = 4;
const EYE_LX = CX - EYE_W - EYE_GAP/2;
const EYE_RX = CX + EYE_GAP/2;
const EYE_Y  = CY - EYE_H/2;

const ES_MAX = 12;   // square mode cursor tracking intensity — increase to follow more
const LP     = 0.11; // lerp smoothness — higher = faster

let eyeStyle = 'pupils'; // 'pupils' | 'square'
function getBR(){ return eyeStyle === 'square' ? EYE_BR_SQUARE : EYE_BR_ROUND; }

// ── Targets (what we animate toward) ──
const T = {
  lx:EYE_LX, ly:EYE_Y, lw:EYE_W, lh:EYE_H, lbr:EYE_BR_ROUND,
  rx:EYE_RX, ry:EYE_Y, rw:EYE_W, rh:EYE_H, rbr:EYE_BR_ROUND,
  tiredH:0, angryH:0, happyOff:0,
  pupilX:0.5, pupilY:0.5, pupilSize:0.36,
  color:'#5ee7df',
  heartPupils:false, sleepMode:false, blushMode:false, chillingMode:false,
  batteryMode:false, batteryLevel:1, clockMode:false, clockHover:false, questionMode:false,
  esxT:0, esyT:0,
};

// ── Current values (lerped each frame) ──
const C = {
  lx:EYE_LX, ly:EYE_Y, lw:EYE_W, lhC:1,  lbr:EYE_BR_ROUND,
  rx:EYE_RX, ry:EYE_Y, rw:EYE_W, rhC:1,  rbr:EYE_BR_ROUND,
  tiredH:0, angryH:0, happyOff:0,
  pupilX:0.5, pupilY:0.5, pupilSize:0.36,
  esxC:0, esyC:0,
};

// ── Eyebrow types (square mode) ──
let browL = 'neutral', browR = 'neutral';

// ── Blink state ──
let isBlinking = false;
let lastBlinkTs = 0, nextBlinkMs = 3000;

// ── Particles ──
let heartParticles = [], tearDrops = [], zzzParticles = [], musicNotes = [];
let musicTimer = 0, musicMode = false;
let musicPlaying = false; // for toggleMusic compat
let _vegaMusicOn  = false; // true while Vega is streaming a song

// ── Animation state ──
let laughBounce = 0, laughPhase = 0;
let scanLineY = 0, dizzyAngle = 0, shakeX = 0;

// ── Cursor tracking ──
const NO_CURSOR_MOODS = new Set(['working','sleeping','dizzy','unamused','ouch','hurt','crying','chilling']);

// ════════════════════════════════════════════
//  LERP & INTERPOLATION
// ════════════════════════════════════════════
function lp(a,b,t){ return a + (b-a)*t; }

function interpEyes(){
  C.lw  = lp(C.lw,  T.lw,  LP);  C.lhC = lp(C.lhC, T.lh,  LP);
  C.lx  = lp(C.lx,  T.lx,  LP);  C.ly  = lp(C.ly,  T.ly,  LP);
  C.lbr = lp(C.lbr, T.lbr, LP);
  C.rw  = lp(C.rw,  T.rw,  LP);  C.rhC = lp(C.rhC, T.rh,  LP);
  C.rx  = lp(C.rx,  T.rx,  LP);  C.ry  = lp(C.ry,  T.ry,  LP);
  C.rbr = lp(C.rbr, T.rbr, LP);
  C.tiredH   = lp(C.tiredH,   T.tiredH,   LP*0.65);
  C.angryH   = lp(C.angryH,   T.angryH,   LP*0.65);
  C.happyOff = lp(C.happyOff, T.happyOff, LP*0.65);
  C.pupilX    = lp(C.pupilX,    T.pupilX,    LP*1.5);
  C.pupilY    = lp(C.pupilY,    T.pupilY,    LP*1.5);
  C.pupilSize = lp(C.pupilSize, T.pupilSize, LP);
  C.esxC = lp(C.esxC, T.esxT, 0.16);
  C.esyC = lp(C.esyC, T.esyT, 0.16);
}

// ════════════════════════════════════════════
//  DRAWING PRIMITIVES
// ════════════════════════════════════════════
function rRect(x,y,w,h,r,fill,stroke,sw){
  if(w<=0||h<=0) return;
  r=Math.max(0,Math.min(r,w/2,h/2));
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw||1.5; ctx.stroke(); }
}

function drawHeart(x,y,sz,color){
  ctx.save(); ctx.translate(x,y); ctx.fillStyle=color; ctx.beginPath();
  const s=sz*0.5;
  ctx.moveTo(0,s*0.4);
  ctx.bezierCurveTo(-s*0.1,s*0.1,-s,-s*0.2,-s,-s*0.6);
  ctx.bezierCurveTo(-s,-s,-s*0.3,-s*1.2,0,-s*0.4);
  ctx.bezierCurveTo(s*0.3,-s*1.2,s,-s,s,-s*0.6);
  ctx.bezierCurveTo(s,-s*0.2,s*0.1,s*0.1,0,s*0.4);
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function drawTeardrop(x,y,r,alpha){
  ctx.save(); ctx.globalAlpha=alpha*0.9; ctx.fillStyle='rgba(96,165,250,0.9)';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-r*0.5,y-r*0.6); ctx.lineTo(x,y-r*2.2); ctx.lineTo(x+r*0.5,y-r*0.6);
  ctx.closePath(); ctx.fill(); ctx.restore();
}

// ── Eyelid cutouts ──
function applyTiredCutout(x,y,w,h,isLeft){
  if(C.tiredH<=0.5) return;
  ctx.save(); ctx.globalCompositeOperation='destination-out'; ctx.beginPath();
  if(isLeft){ ctx.moveTo(x,y-1); ctx.lineTo(x+w,y-1); ctx.lineTo(x,y+C.tiredH-1); }
  else      { ctx.moveTo(x,y-1); ctx.lineTo(x+w,y-1); ctx.lineTo(x+w,y+C.tiredH-1); }
  ctx.closePath(); ctx.fillStyle='#000'; ctx.fill(); ctx.restore();
}
function applyAngryCutout(x,y,w,h,isLeft){
  if(C.angryH<=0.5) return;
  ctx.save(); ctx.globalCompositeOperation='destination-out'; ctx.beginPath();
  if(isLeft){ ctx.moveTo(x,y-1); ctx.lineTo(x+w,y-1); ctx.lineTo(x+w,y+C.angryH-1); }
  else      { ctx.moveTo(x,y-1); ctx.lineTo(x+w,y-1); ctx.lineTo(x,y+C.angryH-1); }
  ctx.closePath(); ctx.fillStyle='#000'; ctx.fill(); ctx.restore();
}
function applyHappyCutout(x,y,w,h,br){
  if(C.happyOff<=0.5) return;
  ctx.save(); ctx.globalCompositeOperation='destination-out';
  rRect(x-1,(y+h)-C.happyOff+1,w+2,h+4,br,'#000');
  ctx.restore();
}

// ════════════════════════════════════════════
//  EYE DRAWING
// ════════════════════════════════════════════

// pupils mode eye
function drawPupilEye(x,y,w,h,br,isLeft){
  rRect(x,y,w,h,br,T.color);
  applyTiredCutout(x,y,w,h,isLeft);
  applyAngryCutout(x,y,w,h,isLeft);
  applyHappyCutout(x,y,w,h,br);
  if(T.heartPupils){
    drawHeart(x+w*C.pupilX, y+h*C.pupilY, Math.min(w,h)*C.pupilSize*1.2, '#07090f');
  } else {
    const pr=Math.min(w,h)*C.pupilSize;
    ctx.beginPath(); ctx.arc(x+w*C.pupilX, y+h*C.pupilY, pr, 0, Math.PI*2);
    ctx.fillStyle='#07090f'; ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*C.pupilX-pr*0.28, y+h*C.pupilY-pr*0.28, pr*0.22, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  }
}

// square mode eye (no pupil)
function drawSquareEye(x,y,w,h,br,isLeft){
  rRect(x,y,w,h,br,T.color);
  applyTiredCutout(x,y,w,h,isLeft);
  applyAngryCutout(x,y,w,h,isLeft);
  applyHappyCutout(x,y,w,h,br);
}

// chilling: 😌 closed arc
function drawChillingEye(x,y,w,h){
  ctx.save(); ctx.strokeStyle=T.color; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x+w*0.08, y+h*0.52);
  ctx.quadraticCurveTo(x+w*0.5, y+h*0.80, x+w*0.92, y+h*0.52);
  ctx.stroke(); ctx.restore();
}

// unamused: 😑 thin flat line
function drawUnamusedEye(x,y,w,h,br){
  rRect(x,y,w,h,br,T.color);
  const lineH=h*0.26, lineY=y+(h-lineH)/2;
  ctx.save(); ctx.globalCompositeOperation='destination-out';
  rRect(x,y,           w, lineY-y+1,           0,'#000');
  rRect(x,lineY+lineH-1,w, y+h-(lineY+lineH)+2, 0,'#000');
  ctx.restore();
}

// dizzy: 😵 X eyes
function drawDizzyEye(x,y,w,h,br){
  rRect(x,y,w,h,br,T.color);
  ctx.save(); ctx.globalCompositeOperation='destination-out';
  ctx.strokeStyle='#000'; ctx.lineWidth=Math.min(w,h)*0.17; ctx.lineCap='round';
  const cx2=x+w*0.5, cy2=y+h*0.5, s=Math.min(w,h)*0.27;
  ctx.beginPath(); ctx.moveTo(cx2-s,cy2-s); ctx.lineTo(cx2+s,cy2+s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx2+s,cy2-s); ctx.lineTo(cx2-s,cy2+s); ctx.stroke();
  ctx.restore();
}

// working: scan line moving inside eye
function drawScanEye(x,y,w,h,br){
  rRect(x,y,w,h,br,T.color);
  ctx.save();
  const r2=Math.max(0,Math.min(br,w/2,h/2));
  ctx.beginPath();
  ctx.moveTo(x+r2,y); ctx.lineTo(x+w-r2,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r2);
  ctx.lineTo(x+w,y+h-r2); ctx.quadraticCurveTo(x+w,y+h,x+w-r2,y+h);
  ctx.lineTo(x+r2,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r2);
  ctx.lineTo(x,y+r2); ctx.quadraticCurveTo(x,y,x+r2,y);
  ctx.closePath(); ctx.clip();
  const sy=y+scanLineY*h;
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(x,sy-2,w,4);
  ctx.strokeStyle='rgba(0,0,0,0.92)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x,sy); ctx.lineTo(x+w,sy); ctx.stroke();
  ctx.restore();
}

// crying square: thin closed line
function drawCrySquareEye(x,y,w,h){ rRect(x,y+h*0.46,w,3,2,T.color); }

// sleeping: flat line
function drawSleepEye(x,y,w,h){ rRect(x,y+h/2-1,w,3,2,T.color); }

// ════════════════════════════════════════════
//  EYEBROWS (square mode — fixed, no cursor shift)
// ════════════════════════════════════════════
function drawEyebrow(x,y,w,type,color){
  ctx.save(); ctx.strokeStyle=color; ctx.lineCap='round'; ctx.lineJoin='round';
  const bx=x+w*0.08, bw=w*0.84, by=y-11;
  ctx.beginPath();
  switch(type){
    case 'neutral':    ctx.lineWidth=2.8; ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); break;
    case 'angry_l':    ctx.lineWidth=3.2; ctx.moveTo(bx,by-4); ctx.lineTo(bx+bw,by+5); break;
    case 'angry_r':    ctx.lineWidth=3.2; ctx.moveTo(bx,by+5); ctx.lineTo(bx+bw,by-4); break;
    case 'sad_l':      ctx.lineWidth=2.8; ctx.moveTo(bx,by+3); ctx.lineTo(bx+bw,by-3); break;
    case 'sad_r':      ctx.lineWidth=2.8; ctx.moveTo(bx,by-3); ctx.lineTo(bx+bw,by+3); break;
    case 'surprised':  ctx.lineWidth=2.8; ctx.arc(bx+bw/2,by+12,bw/2,Math.PI*1.15,Math.PI*1.85,false); break;
    case 'worried_l':  ctx.lineWidth=2.8; ctx.moveTo(bx,by+2); ctx.quadraticCurveTo(bx+bw*0.5,by-7,bx+bw,by+2); break;
    case 'worried_r':  ctx.lineWidth=2.8; ctx.moveTo(bx,by+2); ctx.quadraticCurveTo(bx+bw*0.5,by-7,bx+bw,by+2); break;
    case 'happy':      ctx.lineWidth=2.8; ctx.moveTo(bx,by+1); ctx.quadraticCurveTo(bx+bw*0.5,by-4,bx+bw,by+1); break;
    case 'excited':    ctx.lineWidth=3.0; ctx.arc(bx+bw/2,by+14,bw/2,Math.PI*1.1,Math.PI*1.9,false); break;
    case 'cool':       ctx.lineWidth=2.8; ctx.moveTo(bx,by+3); ctx.lineTo(bx+bw,by+3); break;
    case 'unamused_l': ctx.lineWidth=2.8; ctx.moveTo(bx,by+1); ctx.lineTo(bx+bw*0.5,by+5); ctx.lineTo(bx+bw,by+1); break;
    case 'unamused_r': ctx.lineWidth=2.8; ctx.moveTo(bx,by+1); ctx.lineTo(bx+bw*0.5,by+5); ctx.lineTo(bx+bw,by+1); break;
    case 'thinking_l': ctx.lineWidth=2.8; ctx.moveTo(bx,by+1); ctx.lineTo(bx+bw,by-3); break;
    case 'thinking_r': ctx.lineWidth=2.8; ctx.moveTo(bx,by-3); ctx.quadraticCurveTo(bx+bw*0.5,by-6,bx+bw,by-3); break;
    case 'confused_l': ctx.lineWidth=2.8; ctx.moveTo(bx,by+2); ctx.lineTo(bx+bw,by-4); break;
    case 'confused_r': ctx.lineWidth=2.8; ctx.moveTo(bx,by-4); ctx.lineTo(bx+bw,by+2); break;
    case 'cry_l':      ctx.lineWidth=3.0; ctx.moveTo(bx,by+1); ctx.quadraticCurveTo(bx+bw*0.5,by-6,bx+bw,by+3); break;
    case 'cry_r':      ctx.lineWidth=3.0; ctx.moveTo(bx,by+3); ctx.quadraticCurveTo(bx+bw*0.5,by-6,bx+bw,by+1); break;
    case 'pleading_l': ctx.lineWidth=2.8; ctx.moveTo(bx,by+4); ctx.quadraticCurveTo(bx+bw*0.4,by-8,bx+bw,by); break;
    case 'pleading_r': ctx.lineWidth=2.8; ctx.moveTo(bx,by); ctx.quadraticCurveTo(bx+bw*0.6,by-8,bx+bw,by+4); break;
    case 'sarc_l':     ctx.lineWidth=2.8; ctx.moveTo(bx,by+2); ctx.lineTo(bx+bw,by+2); break;
    case 'sarc_r':     ctx.lineWidth=2.8; ctx.moveTo(bx,by+2); ctx.lineTo(bx+bw*0.6,by+2); ctx.lineTo(bx+bw,by-4); break;
    case 'wink':       ctx.lineWidth=2.8; ctx.moveTo(bx,by); ctx.quadraticCurveTo(bx+bw*0.5,by-5,bx+bw,by); break;
    case 'pain_l':     ctx.lineWidth=3.5; ctx.moveTo(bx,by+4); ctx.quadraticCurveTo(bx+bw*0.5,by+10,bx+bw,by+6); break;
    case 'pain_r':     ctx.lineWidth=3.5; ctx.moveTo(bx,by+6); ctx.quadraticCurveTo(bx+bw*0.5,by+10,bx+bw,by+4); break;
    case 'chill_l':    ctx.lineWidth=2.5; ctx.moveTo(bx,by+1); ctx.quadraticCurveTo(bx+bw*0.5,by+4,bx+bw,by+2); break;
    case 'chill_r':    ctx.lineWidth=2.5; ctx.moveTo(bx,by+2); ctx.quadraticCurveTo(bx+bw*0.5,by+4,bx+bw,by+1); break;
    default:           ctx.lineWidth=2.8; ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by);
  }
  ctx.stroke(); ctx.restore();
}

//  GLASSES & BLUSH

function drawGlasses(){
  const sx = eyeStyle==='square' ? C.esxC : 0;
  const sy = eyeStyle==='square' ? C.esyC : 0;
  const lx=C.lx+sx, rx=C.rx+sx, ly=C.ly+sy;
  const lw=C.lw, rw=C.rw, lh=C.lhC;
  const gt=ly+lh*0.42, gh=lh*0.70;
  ctx.save();
  rRect(lx-2,gt,lw+4,gh,6,'rgba(0,0,0,0.90)');
  rRect(rx-2,gt,rw+4,gh,6,'rgba(0,0,0,0.90)');
  rRect(lx-2,gt,lw+4,gh,6,null,'#1a1a1a',2.5);
  rRect(rx-2,gt,rw+4,gh,6,null,'#1a1a1a',2.5);
  const bY=gt+gh*0.28;
  ctx.strokeStyle='#222'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(lx+lw+2,bY); ctx.lineTo(rx-2,bY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx-2,bY); ctx.lineTo(lx-18,bY+5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx+rw+2,bY); ctx.lineTo(rx+rw+18,bY+5); ctx.stroke();
  ctx.globalAlpha=0.10; ctx.fillStyle='#fff';
  rRect(lx+1,gt+2,lw*0.45,gh*0.28,3,'#fff');
  rRect(rx+1,gt+2,rw*0.45,gh*0.28,3,'#fff');
  ctx.restore();
}

function drawBlush(){
  ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#f472b6';
  ctx.beginPath(); ctx.ellipse(C.lx+C.lw*0.5,C.ly+C.lhC*0.88,C.lw*0.36,C.lhC*0.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(C.rx+C.rw*0.5,C.ry+C.rhC*0.88,C.rw*0.36,C.rhC*0.2,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function spawnTears(continuous){
  if(currentEmotion!=='crying'&&currentEmotion!=='sad') return;
  for(let i=0;i<2;i++) tearDrops.push({x:T.lx+EYE_W*(0.25+Math.random()*0.45),y:T.ly+EYE_H*0.62,vy:1+Math.random()*0.6,r:2.1+Math.random()*1.2,life:90,maxLife:90,type:'tear'});
  for(let i=0;i<2;i++) tearDrops.push({x:T.rx+EYE_W*(0.25+Math.random()*0.45),y:T.ry+EYE_H*0.62,vy:1+Math.random()*0.6,r:2.1+Math.random()*1.2,life:90,maxLife:90,type:'tear'});
  if(continuous) setTimeout(()=>spawnTears(true),320);
}

function tickParticles(ts){
  heartParticles.forEach(p=>{p.y-=p.vy;p.x+=p.vx;p.life--;});
  heartParticles=heartParticles.filter(p=>p.life>0);
  tearDrops.forEach(d=>{d.y+=d.vy;d.life--;});
  tearDrops=tearDrops.filter(d=>d.life>0);
  zzzParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  zzzParticles=zzzParticles.filter(p=>p.life>0);
  musicNotes.forEach(n=>{n.y-=n.vy;n.x+=n.vx;n.life--;});
  musicNotes=musicNotes.filter(n=>n.life>0);
  if(musicMode&&currentEmotion==='music'&&ts-musicTimer>480){
    musicTimer=ts;
    const NOTE_CHARS=['♩','♪','♫','♬'];
    musicNotes.push({x:EYE_LX+Math.random()*(EYE_RX+EYE_W-EYE_LX),y:EYE_Y+EYE_H/2,ch:NOTE_CHARS[Math.floor(Math.random()*4)],vx:(Math.random()-0.5)*0.6,vy:1+Math.random()*0.8,size:10+Math.random()*8,life:70,maxLife:70});
  }
}

function drawParticles(){
  heartParticles.forEach(p=>{
    if(p.life<=0) return;
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife; drawHeart(p.x,p.y,p.size,'#f472b6'); ctx.restore();
  });
  tearDrops.forEach(d=>{
    if(d.life<=0) return;
    ctx.save(); ctx.globalAlpha=(d.life/d.maxLife)*0.88;
    if(d.type==='teardrop'){ drawTeardrop(d.x,d.y,d.r,d.life/d.maxLife); }
    else{ ctx.fillStyle=d.type==='sweat'?'rgba(200,230,255,0.75)':'rgba(96,165,250,0.85)'; ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  zzzParticles.forEach(p=>{
    if(p.life<=0) return;
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=T.color;
    ctx.font=`bold ${p.size}px "Space Grotesk",sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('z',p.x,p.y); ctx.restore();
  });
  musicNotes.forEach(n=>{
    if(n.life<=0) return;
    ctx.save(); ctx.globalAlpha=n.life/n.maxLife; ctx.fillStyle='#fbbf24';
    ctx.font=`${n.size}px "Space Grotesk",sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.ch,n.x,n.y); ctx.restore();
  });
}

      setEmotion('hurt',true);
      hitTimer=setTimeout(()=>{ if(hitCount===2){ hitCount=0; setEmotion(preHitEmotion); } },2000);
    },600);

  } else {

    setEmotion('ouch',true);
    setTimeout(()=>setEmotion('hurt',true),600);
    setTimeout(()=>{ setEmotion('crying'); preHitEmotion='sad'; },1400);

let _cursorHistory=[], _cursorStopTimer=null;
let cursorIsIdle=false, cursorIdleTimer=null;
const CURSOR_IDLE_MS=5000;

function _checkCursorSpin(x,y){
  const now=Date.now();
  _cursorHistory.push({x,y,ts:now});
  _cursorHistory=_cursorHistory.filter(p=>now-p.ts<2000);
  if(_cursorHistory.length<20) return;
  const cx=_cursorHistory.reduce((s,p)=>s+p.x,0)/_cursorHistory.length;
  const cy=_cursorHistory.reduce((s,p)=>s+p.y,0)/_cursorHistory.length;
  let totalAngle=0;
  for(let i=1;i<_cursorHistory.length;i++){
    const a1=Math.atan2(_cursorHistory[i-1].y-cy,_cursorHistory[i-1].x-cx);
    const a2=Math.atan2(_cursorHistory[i].y-cy,_cursorHistory[i].x-cx);
    let da=a2-a1;
    if(da>Math.PI) da-=2*Math.PI;
    if(da<-Math.PI) da+=2*Math.PI;
    totalAngle+=Math.abs(da);
  }
  if(totalAngle>4*Math.PI&&currentEmotion!=='dizzy'){
    _cursorHistory=[];
    setEmotion('dizzy');
    // push context so model knows
    if(typeof chatHistory!=='undefined'){
      chatHistory.push({role:'user',content:'[Vinay spun the cursor in circles around Vega face]'});
      chatHistory.push({role:'assistant',content:'Whoa... everything is spinning, sir. Stop that! [EMOTION:dizzy]'});
      if(typeof addMessage==='function') addMessage('vega','Whoa... everything is spinning, sir. Stop that!');
      if(typeof speak==='function') speak('Whoa... everything is spinning, sir. Stop that!');
      if(typeof saveCurrentChat==='function') saveCurrentChat();
    }
  }
}

// ── Idle eye behavior ──
const IDLE_EYE_MOVES=[
  ()=>{T.pupilX=0.12;T.pupilY=0.5;T.esxT=-ES_MAX*0.7;T.esyT=0;},
  ()=>{T.pupilX=0.88;T.pupilY=0.5;T.esxT=ES_MAX*0.7;T.esyT=0;},
  ()=>{T.pupilX=0.5;T.pupilY=0.15;T.esxT=0;T.esyT=-ES_MAX*0.5;},
  ()=>{T.pupilX=0.18;T.pupilY=0.2;T.esxT=-ES_MAX*0.5;T.esyT=-ES_MAX*0.35;},
  ()=>{T.pupilX=0.82;T.pupilY=0.2;T.esxT=ES_MAX*0.5;T.esyT=-ES_MAX*0.35;},
  ()=>{T.pupilX=0.5;T.pupilY=0.5;T.esxT=0;T.esyT=0;},
  ()=>{doBlink();},
  ()=>{doBlink();setTimeout(doBlink,280);},
];
let idleEyeTimer=null;

function startIdleEyeBehavior(){
  if(idleEyeTimer) return;
  function doMove(){
    if(!cursorIsIdle||NO_CURSOR_MOODS.has(currentEmotion)||currentEmotion==='sleeping'){idleEyeTimer=null;return;}
    IDLE_EYE_MOVES[Math.floor(Math.random()*IDLE_EYE_MOVES.length)]();
    idleEyeTimer=setTimeout(doMove,1400+Math.random()*2200);
  }
  idleEyeTimer=setTimeout(doMove,1000);
}
function stopIdleEyeBehavior(){
  clearTimeout(idleEyeTimer); idleEyeTimer=null;
  T.pupilX=0.5; T.pupilY=0.5; T.esxT=0; T.esyT=0;
}

let mouseInWindow=true;
document.addEventListener('mousemove',e=>{
  mouseInWindow=true;
  lastActivityTime=Date.now();

  if(cursorIsIdle){ cursorIsIdle=false; stopIdleEyeBehavior(); }
  clearTimeout(cursorIdleTimer);
  cursorIdleTimer=setTimeout(()=>{ cursorIsIdle=true; startIdleEyeBehavior(); },CURSOR_IDLE_MS);

  if(NO_CURSOR_MOODS.has(currentEmotion)||currentEmotion==='sleeping'||T.sleepMode) return;

  const rect=canvas.getBoundingClientRect(); if(!rect.width) return;
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const dx=e.clientX-cx, dy=e.clientY-cy;
  const maxD=Math.max(rect.width,200);

  if(eyeStyle==='pupils'){
    T.pupilX=0.5+Math.max(-1,Math.min(1,dx/maxD))*0.26;
    T.pupilY=0.5+Math.max(-1,Math.min(1,dy/maxD))*0.20;
  } else {
    T.esxT=Math.max(-ES_MAX,Math.min(ES_MAX,(dx/maxD)*ES_MAX));
    T.esyT=Math.max(-ES_MAX*0.7,Math.min(ES_MAX*0.7,(dy/maxD)*ES_MAX*0.7));
  }
  _checkCursorSpin(e.clientX,e.clientY);
});

document.addEventListener('mouseleave',()=>{
  mouseInWindow=false;
  T.pupilX=0.5; T.pupilY=0.5; T.esxT=0; T.esyT=0;
  cursorIsIdle=true; startIdleEyeBehavior();
});
document.addEventListener('mouseenter',()=>{ mouseInWindow=true; cursorIsIdle=false; stopIdleEyeBehavior(); });
canvas.addEventListener('mouseenter',()=>{ if(E&&T.clockMode) T.clockMode=true; });

// ════════════════════════════════════════════
//  DRAW FRAME — main loop
// ════════════════════════════════════════════
function drawFrame(ts){
  requestAnimationFrame(drawFrame);
  ctx.clearRect(0,0,CW,CH);
  ctx.save();

  // canvas shake (ouch)
  if(shakeX>0){
    ctx.translate(Math.sin(ts*0.9)*shakeX,(Math.random()-0.5)*shakeX*0.35);
    shakeX=Math.max(0,shakeX-0.55);
  }

  // auto blink
  if(ts-lastBlinkTs>nextBlinkMs&&!isBlinking){
    doBlink(); lastBlinkTs=ts; nextBlinkMs=2000+Math.random()*4000;
  }

  // laugh bounce
  if(laughBounce>0&&currentEmotion==='laugh'){
    laughPhase+=0.18;
    const b=Math.sin(laughPhase)*3.8*Math.max(0,laughBounce);
    T.ly=EYE_Y+b; T.ry=EYE_Y+b;
    laughBounce=Math.max(0,laughBounce-0.007);
  }

  // music sway
  if(musicMode&&currentEmotion==='music'){
    T.ly=EYE_Y+Math.sin(ts*0.003)*2.5;
    T.ry=EYE_Y+Math.sin(ts*0.003+0.5)*2.5;
  }

  // working scan
  if(currentEmotion==='working') scanLineY=(scanLineY+0.009)%1;

  // dizzy spin
  if(currentEmotion==='dizzy'){
    dizzyAngle+=0.055;
    T.pupilX=0.5+Math.cos(dizzyAngle)*0.28;
    T.pupilY=0.5+Math.sin(dizzyAngle)*0.18;
  }

  tickParticles(ts);
  interpEyes();

  // socket shift (square mode only)
  const sx=eyeStyle==='square'?C.esxC:0;
  const sy=eyeStyle==='square'?C.esyC:0;
  const lx=C.lx+sx, ly=C.ly+sy;
  const rx=C.rx+sx, ry=C.ry+sy;
  // brows: FIXED — no socket shift
  const blx=C.lx, bly=C.ly, brx=C.rx, bry=C.ry;

  // ── DRAW EYES ──
  if(T.sleepMode){
    drawSleepEye(lx,ly,C.lw,C.lhC);
    drawSleepEye(rx,ry,C.rw,C.rhC);
    if(eyeStyle==='square'){ drawEyebrow(blx,bly,C.lw,'neutral',T.color+'bb'); drawEyebrow(brx,bry,C.rw,'neutral',T.color+'bb'); }

  } else if(currentEmotion==='chilling'){
    drawChillingEye(lx,ly,C.lw,C.lhC);
    drawChillingEye(rx,ry,C.rw,C.rhC);
    drawEyebrow(blx,bly,C.lw,browL,T.color+'bb');
    drawEyebrow(brx,bry,C.rw,browR,T.color+'bb');

  } else if(currentEmotion==='dizzy'){
    drawDizzyEye(lx,ly,C.lw,C.lhC,C.lbr);
    drawDizzyEye(rx,ry,C.rw,C.rhC,C.rbr);
    if(eyeStyle==='square'){ drawEyebrow(blx,bly,C.lw,'worried_l',T.color+'bb'); drawEyebrow(brx,bry,C.rw,'worried_r',T.color+'bb'); }

  } else if(currentEmotion==='working'){
    drawScanEye(lx,ly,C.lw,C.lhC,C.lbr);
    drawScanEye(rx,ry,C.rw,C.rhC,C.rbr);
    if(eyeStyle==='square'){ drawEyebrow(blx,bly,C.lw,'thinking_l',T.color+'bb'); drawEyebrow(brx,bry,C.rw,'thinking_l',T.color+'bb'); }

  } else if(currentEmotion==='unamused'){
    drawUnamusedEye(lx,ly,C.lw,C.lhC,C.lbr);
    drawUnamusedEye(rx,ry,C.rw,C.rhC,C.rbr);
    drawEyebrow(blx,bly,C.lw,'unamused_l',T.color+'bb');
    drawEyebrow(brx,bry,C.rw,'unamused_r',T.color+'bb');

  } else if(currentEmotion==='crying'&&eyeStyle==='square'){
    drawCrySquareEye(lx,ly,C.lw,C.lhC);
    drawCrySquareEye(rx,ry,C.rw,C.rhC);
    drawEyebrow(blx,bly,C.lw,'cry_l',T.color+'bb');
    drawEyebrow(brx,bry,C.rw,'cry_r',T.color+'bb');

  } else if(eyeStyle==='square'){
    drawSquareEye(lx,ly,C.lw,C.lhC,C.lbr,true);
    drawSquareEye(rx,ry,C.rw,C.rhC,C.rbr,false);
    if(T.blushMode) drawBlush();
    drawEyebrow(blx,bly,C.lw,browL,T.color+'bb');
    drawEyebrow(brx,bry,C.rw,browR,T.color+'bb');

  } else {
    drawPupilEye(lx,ly,C.lw,C.lhC,C.lbr,true);
    drawPupilEye(rx,ry,C.rw,C.rhC,C.rbr,false);
    if(T.blushMode) drawBlush();
  }

  // glasses on top (cool emotion)
  if(currentEmotion==='cool'){
    drawGlasses();
    if(eyeStyle==='square'){ drawEyebrow(blx,bly,C.lw,'cool',T.color+'bb'); drawEyebrow(brx,bry,C.rw,'cool',T.color+'bb'); }
  }

  drawParticles();
  ctx.restore();
}

function setEmotion(name, skipResetParticles){
  if(!EMOTIONS[name]) return;
  // ── Music protection: don't override music vibe with low-priority emotions ──
  const MUSIC_OVERRIDE_BLOCK = new Set(['thinking','neutral','listening','working','chilling']);
  if(_vegaMusicOn && MUSIC_OVERRIDE_BLOCK.has(name)) return;
  if(!skipResetParticles){
    preHitEmotion=name;
    heartParticles=[]; tearDrops=[]; zzzParticles=[]; musicNotes=[];
    laughBounce=0; scanLineY=0; dizzyAngle=0; musicMode=false;
  }
  const prev=currentEmotion;
  currentEmotion=name;
  EMOTIONS[name].apply();
  const el=document.getElementById('emotionLabel');
  if(el){el.textContent=EMOTIONS[name].label;el.style.color=EMOTIONS[name].color;}
  updateDashboard(name);
  if(prev!==name){emotionHistory.unshift(name);if(emotionHistory.length>6)emotionHistory.pop();}
  document.querySelectorAll('.dev-btn').forEach(b=>b.classList.toggle('active',b.dataset.emotion===name));
}

function parseEmotionTag(text){ const m=text.match(/\[EMOTION:([a-z_]+)\]/i)||text.match(/\[([a-z_]+)\]\s*$/i); return m?m[1]:null; }
function stripEmotionTag(text){ return text.replace(/\s*\[EMOTION:[a-z_]+\]\s*$/i,'').replace(/\s*\[[a-z_]+\]\s*$/i,'').trim(); }

const EKW={
  happy:['happy','great','awesome','wonderful','excellent','fantastic','glad','yay','thanks','thank you'],
  sad:['sad','sorry','miss','lost','hurt','alone','depressed','unhappy'],
  angry:['angry','furious','mad','hate','terrible','awful','worst'],
  confused:['confused','unclear','dont understand','not sure','what do you mean'],
  surprised:['wow','whoa','omg','amazing','shocking','unbelievable','seriously'],
  excited:['exciting','cant wait','incredible','lets go','finally','yes!'],
  love:['love','adore','heart','beautiful','cute','sweet','lovely'],
  nervous:['nervous','anxious','worried','scared','stress','panic'],
  curious:['interesting','curious','how does','why does','what if','tell me more'],
  chilling:['chill','relax','no worries','take it easy','its fine'],
  laugh:['haha','lol','funny','hilarious','lmao','hehe'],
  blush:['embarrassed','blushing','shy','flattered','awkward'],
  working:['sure','working on','let me','doing','on it','processing','just a moment'],
  cool:['nice','smooth','slick','that was cool','well done','nailed','perfect'],
  wink:['joking','just kidding','jk','wink','playful','teasing'],
  unamused:['whatever','ok ok','yeah yeah','i know','again','same thing','boring','obviously'],
};

function detectFromInput(text){
  const t=text.toLowerCase();
  if(/battery|charge level|power level/.test(t)){
    if(/low|dying|critical|empty/.test(t)) return'battery_low';
    if(/half|medium|draining/.test(t)) return'battery_mid';
    return'battery_high';
  }
  if(/\btime\b|what time|clock/.test(t)) return'clock';
  if(/don.t (know|understand)|not sure|unclear|confused/.test(t)) return'confused';
  if(/\?/.test(t)) return'thinking';
  for(const[em,words] of Object.entries(EKW)){
    for(const w of words) if(t.includes(w)) return em;
  }
  return'thinking';
}

function detectFromResponse(t){
  const txt=t.toLowerCase();
  if(/sorry|sad|unfortunate|that must|difficult|tough/.test(txt)) return'sad';
  if(/haha|funny|love that|wonderful|glad|happy|great news/.test(txt)) return'happy';
  if(/interesting|fascinating|curious|did you know/.test(txt)) return'curious';
  if(/wow|amazing|incredible|whoa|really/.test(txt)) return'surprised';
  if(/working on|let me|one moment|just a sec|on it/.test(txt)) return'working';
  if(/don.t understand|unclear|rephrase|could you/.test(txt)) return'question';
  if(/wink|just kidding|joking|playful/.test(txt)) return'wink';
  if(/smooth|slick|nailed|perfect|exactly/.test(txt)) return'cool';
  if(/obviously|of course|as expected|naturally/.test(txt)) return'unamused';
  return'neutral';
}

// ════════════════════════════════════════════
//  TTS — TEXT TO SPEECH (Chrome + Edge + Firefox)
// ════════════════════════════════════════════
let ttsMuted=false;
let ttsLang='en-US';
let voicesReady=false;
let _voiceCache={};

// Pre-load voices as soon as they're available
function initVoices(){
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length) return;
  voicesReady=true;
  // Cache best voice per language
  const langs=['en-US','te-IN','hi-IN'];
  langs.forEach(lang=>{
    const code=lang.split('-')[0];
    // Priority: exact lang match local → exact lang match → partial match → default
    _voiceCache[lang]=
      voices.find(v=>v.lang===lang&&v.localService&&!v.name.includes('Google'))||
      voices.find(v=>v.lang===lang&&v.localService)||
      voices.find(v=>v.lang===lang)||
      voices.find(v=>v.lang.startsWith(code)&&v.localService)||
      voices.find(v=>v.lang.startsWith(code))||
      voices.find(v=>v.default)||
      voices[0];
  });
  console.log('[TTS] Voices loaded:',Object.entries(_voiceCache).map(([k,v])=>`${k}→${v?.name}`).join(', '));
}

if(window.speechSynthesis){
  // Chrome fires voiceschanged after load
  window.speechSynthesis.onvoiceschanged=initVoices;
  // Edge/Firefox often have voices immediately
  setTimeout(initVoices,100);
  setTimeout(initVoices,800);
}

// 4-line TTS limit
const TTS_MAX_LINES=4;
const TTS_OVERFLOW_PHRASES=[
  'Sir, this answer is a bit detailed — please take a look.',
  'There is more to read here, sir.',
  'I have written out the full answer for you, sir.',
  'Sir, please have a look at the complete response.',
];

function getTTSText(text){
  // Strip markdown formatting for speech
  let clean=text
    .replace(/```[\s\S]*?```/g,'')
    .replace(/`[^`]+`/g,'')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/#{1,3}\s/g,'')
    .replace(/[-*]\s/g,'')
    .replace(/\n{2,}/g,'\n')
    .trim();
  const lines=clean.split('\n').filter(l=>l.trim().length>0);
  if(lines.length<=TTS_MAX_LINES){
    return clean;
  }
  // Too long — return overflow phrase
  return TTS_OVERFLOW_PHRASES[Math.floor(Math.random()*TTS_OVERFLOW_PHRASES.length)];
}

function speak(text){
  if(ttsMuted||!window.speechSynthesis) return;
  // Cancel any ongoing speech immediately
  window.speechSynthesis.cancel();
  const ttsText=getTTSText(text);
  if(!ttsText) return;

  // Small delay to avoid Chrome lag on cancel→speak
  setTimeout(()=>{
    const utt=new SpeechSynthesisUtterance(ttsText);
    utt.lang=ttsLang;
    utt.rate=ttsLang.startsWith('te')?0.9:ttsLang.startsWith('hi')?0.95:1.0;
    utt.pitch=1.05;
    utt.volume=1;
    const voice=_voiceCache[ttsLang]||_voiceCache['en-US'];
    if(voice) utt.voice=voice;
    utt.onstart=()=>{
      pauseMicForTTS(); // pause mic so Vega doesn't hear itself
    };
    utt.onend=()=>{
      resumeMicAfterTTS(); // resume mic after speaking
    };
    utt.onerror=(e)=>{
      if(e.error!=='interrupted'&&e.error!=='canceled')
        console.warn('[TTS error]',e.error);
      resumeMicAfterTTS();
    };
    window.speechSynthesis.speak(utt);
  },50);
}

// Chrome has a bug where TTS stops after ~15s — keep it alive
setInterval(()=>{
  if(window.speechSynthesis&&window.speechSynthesis.speaking){
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }
},10000);

function stopSpeaking(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

function toggleTTS(){
  ttsMuted=!ttsMuted;
  const btn=document.getElementById('ttsBtn');
  if(btn){btn.textContent=ttsMuted?'🔇':'🔊';btn.classList.toggle('muted',ttsMuted);}
  if(ttsMuted) stopSpeaking();
  updateDashVoice();
  showToast(ttsMuted?'Voice muted':'Voice on');
}

let taskSteps=[];

function setTaskStatus(steps,activeIdx){
  taskActive=activeIdx>=0;
  taskSteps=steps;
  // task bar in chat
  const tb=document.getElementById('taskBar');
  const tbt=document.getElementById('taskBarText');
  if(tb&&tbt){
    tb.classList.toggle('active',taskActive);
    if(taskActive&&steps[activeIdx])tbt.textContent=steps[activeIdx];

  // dashboard

      ds.appendChild(d);

// Simulate task detection from messages
function detectTask(text){
  const t=text.toLowerCase();
  if(/play|music|song|spotify/.test(t)){
    return['Detecting music app','Opening player','Searching song','Playing'];
  }
  if(/open|launch|start/.test(t)){
    return['Finding app','Opening application','Ready'];
  }
  if(/search|find|look up/.test(t)){
    return['Searching web','Gathering results','Summarizing'];
  }
  if(/weather/.test(t)){
    return['Detecting location','Fetching weather','Done'];
  }
  return null;
}

function runTaskAnimation(steps){
  setTaskStatus(steps,0);setEmotion('working');
  let i=0;
  const next=()=>{
    i++;
    if(i<steps.length){setTaskStatus(steps,i);setTimeout(next,900+Math.random()*600);}
    else{setTimeout(()=>{clearTask();},1200);}
  };
  setTimeout(next,800+Math.random()*400);
}

let panelOrder=['panel-history','panel-vega','panel-chat'];
let collapsedPanels=new Set();
const defaultWidths={'panel-history':20,'panel-vega':45,'panel-chat':35};
let panelWidths={...defaultWidths};

function applyPanelWidths(){
  const active=panelOrder.filter(id=>!collapsedPanels.has(id));
  const totalPct=active.reduce((s,id)=>s+panelWidths[id],0);
  panelOrder.forEach(id=>{
    const el=document.getElementById(id);
    if(collapsedPanels.has(id)){el.style.width='0px';el.style.minWidth='0px';el.style.overflow='hidden';}
    else{const pct=(panelWidths[id]/totalPct)*100;el.style.width=pct+'%';el.style.minWidth='170px';el.style.overflow='hidden';}
  });
  renderCollapsedTabs();
}

function rebuildPanels(){
  const container=document.getElementById('panelsContainer');
  container.querySelectorAll('.drag-handle').forEach(h=>h.remove());
  panelOrder.forEach(id=>container.appendChild(document.getElementById(id)));
  const panelEls=panelOrder.map(id=>document.getElementById(id));
  for(let i=0;i<panelEls.length-1;i++){
    const h=document.createElement('div');h.className='drag-handle';h.id='dh-'+i;
    h.onmousedown=e=>startResize(e,i);panelEls[i].after(h);
  }
  applyPanelWidths();
}

function collapsePanel(id){
  collapsedPanels.add(id);
  const el=document.getElementById(id);el.classList.add('collapsing');
  setTimeout(()=>el.classList.remove('collapsing'),320);
  applyPanelWidths();showToast(el.dataset.name+' closed');
}

function expandPanel(id){
  collapsedPanels.delete(id);
  const el=document.getElementById(id);el.classList.add('collapsing');
  setTimeout(()=>el.classList.remove('collapsing'),320);
  applyPanelWidths();
}

function movePanel(id,dir){
  const i=panelOrder.indexOf(id);
  if(dir==='left'&&i>0)[panelOrder[i],panelOrder[i-1]]=[panelOrder[i-1],panelOrder[i]];
  else if(dir==='right'&&i<panelOrder.length-1)[panelOrder[i],panelOrder[i+1]]=[panelOrder[i+1],panelOrder[i]];
  rebuildPanels();showToast(document.getElementById(id).dataset.name+' moved '+dir);
}

function renderCollapsedTabs(){
  const c=document.getElementById('collapsedTabs');c.innerHTML='';
  collapsedPanels.forEach(id=>{
    const el=document.getElementById(id);
    const tab=document.createElement('div');
    const idx=panelOrder.indexOf(id);
    tab.className='collapsed-tab '+(idx===0?'left-tab':'right-tab');
    tab.textContent=el.dataset.name;tab.onclick=()=>expandPanel(id);c.appendChild(tab);
  });
}

// ── Resize drag ──
let resizing=false,resizeIdx=-1,resizeStartX=0,resizeSW={};

function startResize(e,idx){
  resizing=true;resizeIdx=idx;resizeStartX=e.clientX;
  const active=panelOrder.filter(id=>!collapsedPanels.has(id));
  const lId=active[idx],rId=active[idx+1];
  resizeSW={lId,rId,lw:panelWidths[lId],rw:panelWidths[rId]};
  document.getElementById('dh-'+idx)?.classList.add('dragging');
  e.preventDefault();
}
document.addEventListener('mousemove',e=>{
  if(!resizing)return;
  const tw=document.getElementById('panelsContainer').offsetWidth;if(!tw)return;
  const dpct=((e.clientX-resizeStartX)/tw)*100;
  const{lId,rId,lw,rw}=resizeSW,min=8;
  panelWidths[lId]=Math.max(min,Math.min(lw+rw-min,lw+dpct));
  panelWidths[rId]=lw+rw-panelWidths[lId];
  applyPanelWidths();
});
document.addEventListener('mouseup',()=>{if(resizing){document.querySelectorAll('.drag-handle').forEach(h=>h.classList.remove('dragging'));resizing=false;}});

let ws=null,wsReady=false;
let chatHistory=[],currentChatId=null,allChats={};

function connectWS(){
  setConnStatus('connecting');
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onopen=()=>{wsReady=true;setConnStatus('online');showToast('Vega connected ✓');};
  ws.onmessage=e=>{
    try{
      const data=JSON.parse(e.data);
      if(data.type==='ping'){ws.send(JSON.stringify({type:'pong'}));return;}
      if(data.type==='response'){
        removeTyping();stopSpeaking();
        let raw=data.text||'';
        const tag=parseEmotionTag(raw);
        const clean=stripEmotionTag(raw);
        addMessage('vega',clean);
        chatHistory.push({role:'assistant',content:clean});
        msgCount++;
        if(tag&&EMOTIONS[tag])setEmotion(tag);
        else setEmotion(detectFromResponse(clean)||'neutral');
        speak(clean);
        setConnStatus('online');
        saveCurrentChat();clearTask();
      }
      if(data.type==='whatsapp_sent'){
        removeTyping();stopSpeaking();
        let raw=data.text||'';
        const tag=parseEmotionTag(raw);
        const clean=stripEmotionTag(raw);
        addWhatsAppMessage(clean, data.contact||'', data.message||'');
        chatHistory.push({role:'assistant',content:clean});
        msgCount++;
        if(tag&&EMOTIONS[tag])setEmotion(tag);
        else setEmotion('cool');
        speak(clean);
        setConnStatus('online');
        saveCurrentChat();clearTask();
      }
      if(data.type==='error'){removeTyping();addMessage('vega','Something went wrong. Try again.');setEmotion('nervous');setConnStatus('online');clearTask();}
      if(data.type==='music_playing'){
        removeTyping();stopSpeaking();
        let raw=data.text||'';
        const tag=parseEmotionTag(raw);
        const clean=stripEmotionTag(raw);
        addMusicMessage(clean, data.query||'', data.title||'', data.artist||'');
        chatHistory.push({role:'assistant',content:clean});
        msgCount++;
        setEmotion('music');
        speak(clean);
        setConnStatus('online');
        saveCurrentChat();clearTask();
      }
    }catch(err){console.error(err);}
  };
  ws.onclose=()=>{wsReady=false;setConnStatus('offline');setTimeout(connectWS,3000);};
  ws.onerror=()=>{wsReady=false;setConnStatus('offline');};
}

function setConnStatus(s){
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
  if(!dot||!txt)return;
  if(s==='online'){dot.className='status-dot';txt.textContent='Vega · Online';}
  else if(s==='offline'){dot.className='status-dot offline';txt.textContent='Disconnected · Retrying...';}
  else if(s==='connecting'){dot.className='status-dot thinking';txt.textContent='Connecting...';}
  else if(s==='thinking'){dot.className='status-dot thinking';txt.textContent='Thinking...';}
}

function formatMD(t){
  t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\n/g,'<br>');
  return t;
}

// ── Local query intercepts (time, date, battery — never send to server) ──────
function handleLocalQuery(text){
  const t=text.toLowerCase().trim();
  const now=new Date();
  if(/\b(what.?s the time|current time|time now|what time is it|tell me the time|time)\b/.test(t)&&t.length<20){
    const timeStr=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    setEmotion('clock');
    return{text:`It's ${timeStr}, sir.`,emotion:'clock'};
  }
  if(/\b(what.?s the date|today.?s date|what day|which day|date today)\b/.test(t)){
    const dateStr=now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    return{text:`Today is ${dateStr}.`,emotion:'neutral'};
  }
  if(/\b(battery|charge|power level)\b/.test(t)){
    if('getBattery' in navigator){
      navigator.getBattery().then(b=>{
        const pct=Math.round(b.level*100);
        const status=b.charging?'charging':'on battery';
        const em=pct>60?'battery_high':pct>20?'battery_mid':'battery_low';
        const msg=`Battery is at ${pct}%, ${status}.`;
        addMessage('vega',msg);chatHistory.push({role:'assistant',content:msg});
        setEmotion(em);speak(msg);
      });
      return{text:'Checking battery...',emotion:'thinking'};
    }
    return{text:'Battery API not available in this browser.',emotion:'neutral'};
  }
  return null;
}

function sendMessage(){
  const vegaInp=document.getElementById('vegaInput');
  const chatInp=document.getElementById('chatInput');
  const input=vegaInp||chatInp;
  const text=(input?.value||'').trim();
  if(!text) return;
  if(!wsReady){showToast('Not connected yet');return;}
  input.value='';
  if(vegaInp) autoResizeVega(vegaInp);
  if(chatInp) autoResize(chatInp);

  // Local intercepts
  const localResp=handleLocalQuery(text);
  if(localResp&&localResp.text!=='Checking battery...'){
    addMessage('user',text);chatHistory.push({role:'user',content:text});msgCount++;
    setTimeout(()=>{
      addMessage('vega',localResp.text);
      chatHistory.push({role:'assistant',content:localResp.text});
      msgCount++;setEmotion(localResp.emotion||'neutral');
      speak(localResp.text);saveCurrentChat();
    },280);
    return;
  }

  // Recovery check
  if((currentEmotion==='crying'||currentEmotion==='hurt')&&checkRecovery(text)){
    setTimeout(()=>{setEmotion('blush');setTimeout(()=>setEmotion('happy'),2000);},400);
  }
  addMessage('user',text);
  chatHistory.push({role:'user',content:text});
  msgCount++;lastActivityTime=Date.now();
  stopSpeaking();
  // Proactive: note if mic is active and user types
  if(micActive){
    showToast('Tip: voice input is active — you can speak instead');
  }
  const taskS=detectTask(text);
  if(taskS) runTaskAnimation(taskS);
  else{const em=detectFromInput(text);setEmotion(em||'thinking');}
  addTyping();setConnStatus('thinking');
  ws.send(JSON.stringify({type:'message',text}));
}

let accumulatedText='';      // builds up full sentence across finals

function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Speech not supported in this browser');return false;}
  recognition=new SR();
  recognition.lang=speechLang;
  recognition.interimResults=true;
  recognition.continuous=true;  // keep listening
  recognition.maxAlternatives=1;

  recognition.onresult=e=>{
    if(micPaused) return;
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    const inp=document.getElementById('vegaInput')||document.getElementById('chatInput');
    // Show live preview in input box
    if(inp){
      inp.value=(accumulatedText+' '+final+interim).trim();
      if(inp.id==='vegaInput') autoResizeVega(inp); else autoResize(inp);
    }
    if(final.trim()){
      accumulatedText=(accumulatedText+' '+final.trim()).trim();
      // Reset silence timer — send only after 2.5s of silence
      clearTimeout(silenceSendTimer);
      silenceSendTimer=setTimeout(()=>{
        const toSend=accumulatedText.trim();
        accumulatedText='';
        if(inp) inp.value='';
        if(toSend) sendMessageText(toSend);
      },2500);
    }
  };

  // When recognition ends (browser stops it), restart if mic should still be on
  recognition.onend=()=>{
    if(micActive&&!micPaused){
      // Restart to keep listening
      micRestartTimer=setTimeout(()=>{
        if(micActive&&recognition){
          try{recognition.lang=speechLang;recognition.start();}catch(e){}
        }
      },200);
    }
  };

  recognition.onerror=e=>{
    if(e.error==='no-speech') return; // ignore silence
    if(e.error==='aborted') return;   // ignore manual stops
    showToast('Voice: '+e.error);
    if(e.error==='not-allowed'){stopMic();return;}
    // For other errors, try to restart
    if(micActive){
      micRestartTimer=setTimeout(()=>{
        if(micActive){try{recognition.start();}catch(e){}}
      },500);
    }
  };
  return true;
}

function toggleMic(){micActive?stopMic():startMic();}

function startMic(){
  if(!recognition&&!setupSpeech()) return;
  clearTimeout(micRestartTimer);
  micPaused=false;
  try{recognition.lang=speechLang;recognition.start();}
  catch(e){
    // Already started — that's fine
    if(!e.message.includes('already started')) showToast('Mic: '+e.message);
  }
  micActive=true;
  document.getElementById('micBtn')?.classList.add('mic-active');
  document.getElementById('vegaMicBtn')?.classList.add('mic-active');
  setEmotion('listening');
}

function stopMic(){
  clearTimeout(micRestartTimer);
  clearTimeout(silenceSendTimer);
  accumulatedText='';
  micActive=false;micPaused=false;
  if(recognition){try{recognition.stop();}catch(e){}}
  document.getElementById('micBtn')?.classList.remove('mic-active');
  document.getElementById('vegaMicBtn')?.classList.remove('mic-active');
  if(currentEmotion==='listening') setEmotion('neutral');
}

// Pause mic while Vega speaks — resumes after TTS ends
function pauseMicForTTS(){
  if(!micActive) return;
  micPaused=true;
  clearTimeout(silenceSendTimer);
  accumulatedText='';
  if(recognition){try{recognition.stop();}catch(e){}}
}

function resumeMicAfterTTS(){
  if(!micActive) return;
  micPaused=false;
  setTimeout(()=>{
    if(micActive&&recognition){
      try{recognition.lang=speechLang;recognition.start();}catch(e){}
    }
  },400); // small delay so TTS audio fully stops
}

// Helper: send message from text string (used by STT)
function sendMessageText(text){
  if(!text.trim()) return;
  if(!wsReady){showToast('Not connected yet');return;}
  const localResp=handleLocalQuery(text);
  if(localResp&&localResp.text!=='Checking battery...'){
    addMessage('user',text);chatHistory.push({role:'user',content:text});msgCount++;
    setTimeout(()=>{
      addMessage('vega',localResp.text);
      chatHistory.push({role:'assistant',content:localResp.text});
      msgCount++;setEmotion(localResp.emotion||'neutral');
      speak(localResp.text);saveCurrentChat();
    },280);
    return;
  }
  if((currentEmotion==='crying'||currentEmotion==='hurt')&&checkRecovery(text)){
    setTimeout(()=>{setEmotion('blush');setTimeout(()=>setEmotion('happy'),2000);},400);
  }
  addMessage('user',text);
  chatHistory.push({role:'user',content:text});
  msgCount++;lastActivityTime=Date.now();
  stopSpeaking();
  const taskS=detectTask(text);
  if(taskS) runTaskAnimation(taskS);
  else{const em=detectFromInput(text);setEmotion(em||'thinking');}
  addTyping();setConnStatus('thinking');
  ws.send(JSON.stringify({type:'message',text}));
}
